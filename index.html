<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1a1a1e;
    --surface3: #222228;
    --border: #2a2a32;
    --border-bright: #3a3a46;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9090a8;
    --accent: #7b6cff;
    --accent-glow: rgba(123,108,255,0.18);
    --accent-subtle: rgba(123,108,255,0.08);
    --green: #4ade80;
    --green-glow: rgba(74,222,128,0.15);
    --red: #f87171;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
    --t: 0.15s ease;
  }
  [data-theme="light"] {
    --bg: #f4f4f8; --surface: #ffffff; --surface2: #f0f0f5; --surface3: #e8e8f0;
    --border: #dddde8; --border-bright: #c8c8d8; --text: #111118;
    --text-muted: #8888a0; --text-dim: #555568;
    --accent: #5a4fff; --accent-glow: rgba(90,79,255,0.12); --accent-subtle: rgba(90,79,255,0.06);
    --green: #16a34a; --green-glow: rgba(22,163,74,0.12); --red: #dc2626;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; font-size: 14px;
    transition: background 0.2s, color 0.2s;
  }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* NAV */
  .topnav {
    display: flex; align-items: center; padding: 0 24px; height: 52px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; z-index: 100; flex-shrink: 0;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .brand-icon {
    width: 26px; height: 26px; background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .theme-btn {
    width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); transition: all var(--t); font-size: 15px;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

  /* LAYOUT */
  .app-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 52px); }

  /* SIDEBAR */
  .sidebar {
    width: 240px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--surface); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
  .search-wrap { position: relative; }
  .search-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 10px 7px 32px;
    font-family: var(--mono); font-size: 12px; color: var(--text); outline: none;
    transition: border-color var(--t);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); background: var(--accent-subtle); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }
  .sidebar-folders { flex: 1; overflow-y: auto; padding: 8px 8px 0; }
  .folder-section-title {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); padding: 8px 8px 4px;
  }
  .folder-item {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px;
    border-radius: var(--radius); cursor: pointer; color: var(--text-dim);
    font-size: 13px; transition: all var(--t); position: relative;
  }
  .folder-item:hover { background: var(--surface2); color: var(--text); }
  .folder-item.active { background: var(--accent-subtle); color: var(--accent); }
  .folder-icon { font-size: 13px; flex-shrink: 0; }
  .folder-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .folder-count {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    background: var(--surface3); padding: 1px 5px; border-radius: 10px;
  }
  .folder-item.active .folder-count { background: var(--accent-glow); color: var(--accent); }
  .folder-actions { display: none; gap: 2px; margin-left: auto; }
  .folder-item:hover .folder-actions { display: flex; }
  .folder-item:hover .folder-count { display: none; }
  .icon-btn {
    width: 22px; height: 22px; border: none; background: transparent; cursor: pointer;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text-muted); transition: all var(--t);
  }
  .icon-btn:hover { background: var(--surface3); color: var(--text); }
  .icon-btn.danger:hover { background: rgba(248,113,113,0.12); color: var(--red); }
  .add-folder-btn {
    margin: 8px; padding: 7px 10px; border: 1px dashed var(--border);
    border-radius: var(--radius); background: transparent; cursor: pointer;
    color: var(--text-muted); font-family: var(--sans); font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; transition: all var(--t); width: calc(100% - 16px);
  }
  .add-folder-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

  /* MAIN */
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .content-header {
    padding: 16px 24px 12px; border-bottom: 1px solid var(--border);
    background: var(--surface); display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-shrink: 0;
  }
  .content-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .folder-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 2px 7px;
    border-radius: 10px; background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-glow);
  }
  .add-script-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all var(--t); white-space: nowrap; box-shadow: 0 0 16px var(--accent-glow);
  }
  .add-script-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  /* CARDS */
  .scripts-grid {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px; align-content: start;
  }
  .script-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px; cursor: pointer;
    transition: all var(--t); position: relative; overflow: hidden;
    animation: cardIn 0.2s ease forwards;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .script-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    opacity:0; transition: opacity var(--t);
  }
  .script-card:hover { border-color: var(--border-bright); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .script-card:hover::before { opacity: 1; }
  .card-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; line-height: 1.3; }
  .card-dual { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .card-half { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
  .card-half-label {
    font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 4px;
  }
  .card-half-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .script-half .card-half-label { color: var(--accent); }
  .script-half .card-half-dot { background: var(--accent); }
  .template-half .card-half-label { color: var(--green); }
  .template-half .card-half-dot { background: var(--green); }
  .card-half-preview {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted); line-height: 1.55;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .card-half-empty { font-style: italic; opacity: 0.45; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); }
  .card-date { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
  .card-actions { display: flex; align-items: center; gap: 4px; opacity: 0; transition: opacity var(--t); }
  .script-card:hover .card-actions { opacity: 1; }
  .card-copy-btn {
    display: flex; align-items: center; gap: 3px; padding: 3px 7px;
    border: 1px solid var(--border); border-radius: 5px; background: var(--surface3);
    cursor: pointer; color: var(--text-muted); font-family: var(--mono);
    font-size: 10px; font-weight: 500; transition: all var(--t);
  }
  .card-copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
  .card-copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-glow); }
  .card-menu-btn {
    width: 22px; height: 22px; border: none; background: transparent; cursor: pointer;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 12px; transition: all var(--t);
  }
  .card-menu-btn:hover { background: var(--surface3); color: var(--text); }
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); text-align: center; gap: 12px; padding: 40px;
  }
  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-title { font-weight: 700; font-size: 16px; color: var(--text-dim); }
  .empty-desc { font-size: 13px; line-height: 1.6; max-width: 280px; }

  /* EDITOR PANEL */
  .editor-panel {
    width: 0; flex-shrink: 0; border-left: 1px solid var(--border);
    background: var(--surface); display: flex; flex-direction: column;
    overflow: hidden; transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .editor-panel.open { width: 440px; }
  .editor-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .editor-title-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--sans); font-weight: 700; font-size: 16px; color: var(--text);
  }
  .editor-title-input::placeholder { color: var(--text-muted); }
  .editor-close-btn {
    width: 28px; height: 28px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: var(--text-muted); font-size: 13px; transition: all var(--t); flex-shrink: 0;
  }
  .editor-close-btn:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.08); }

  /* TOOLBAR */
  .editor-toolbar {
    padding: 9px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }

  /* TOGGLE PILL */
  .pane-toggle {
    display: flex; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px; gap: 2px; flex-shrink: 0;
  }
  .toggle-opt {
    padding: 5px 14px; font-family: var(--mono); font-size: 11px; font-weight: 600;
    cursor: pointer; border: none; background: transparent; color: var(--text-muted);
    border-radius: 16px; transition: all 0.2s; display: flex; align-items: center; gap: 5px;
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .toggle-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .toggle-opt[data-pane="script"] .toggle-dot { background: var(--accent); }
  .toggle-opt[data-pane="template"] .toggle-dot { background: var(--green); }
  .toggle-opt.active[data-pane="script"] { background: var(--accent); color: #fff; box-shadow: 0 0 10px var(--accent-glow); }
  .toggle-opt.active[data-pane="script"] .toggle-dot { background: rgba(255,255,255,0.7); }
  .toggle-opt.active[data-pane="template"] { background: var(--green); color: #000; box-shadow: 0 0 10px var(--green-glow); }
  .toggle-opt.active[data-pane="template"] .toggle-dot { background: rgba(0,0,0,0.4); }
  .toggle-opt:not(.active):hover { background: var(--surface3); color: var(--text); }

  .toolbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  .copy-editor-btn {
    display: flex; align-items: center; gap: 5px; padding: 5px 12px;
    background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border);
    border-radius: var(--radius); font-family: var(--sans); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all var(--t);
  }
  .copy-editor-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
  .copy-editor-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-glow); }

  .save-btn {
    margin-left: auto; display: flex; align-items: center; gap: 5px; padding: 5px 14px;
    background: var(--green); color: #000; border: none; border-radius: var(--radius);
    font-family: var(--sans); font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all var(--t); box-shadow: 0 0 10px var(--green-glow); flex-shrink: 0;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn.saved { background: var(--surface3); color: var(--text-muted); box-shadow: none; }

  /* ACTIVE PANE INDICATOR */
  .pane-label-bar {
    padding: 7px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface2);
  }
  .pane-label {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .pane-label-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pane-script-label { color: var(--accent); }
  .pane-script-label .pane-label-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .pane-template-label { color: var(--green); }
  .pane-template-label .pane-label-dot { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
  .pane-char-count { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }

  /* TEXTAREA */
  .editor-textarea {
    flex: 1; padding: 16px; background: transparent; border: none; outline: none;
    font-family: var(--mono); font-size: 13px; color: var(--text);
    resize: none; line-height: 1.75; overflow-y: auto;
  }
  .editor-textarea::placeholder { color: var(--text-muted); }

  /* FOOTER */
  .editor-footer {
    padding: 8px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .editor-footer-meta { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
  .autosave-indicator { font-family: var(--mono); font-size: 10px; display: flex; align-items: center; gap: 4px; color: var(--green); }
  .autosave-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.15s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-bright); border-radius: var(--radius-lg);
    padding: 24px; width: 360px; max-width: 90vw;
    transform: translateY(8px) scale(0.97); transition: transform 0.15s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title { font-weight: 700; font-size: 16px; margin-bottom: 16px; }
  .modal-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; font-family: var(--sans);
    font-size: 14px; color: var(--text); outline: none; margin-bottom: 16px; transition: border-color var(--t);
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); color: var(--text-dim); font-family: var(--sans);
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--t);
  }
  .btn-cancel:hover { border-color: var(--border-bright); color: var(--text); }
  .btn-confirm {
    padding: 8px 16px; border: none; border-radius: var(--radius); background: var(--accent);
    color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all var(--t); box-shadow: 0 0 12px var(--accent-glow);
  }
  .btn-confirm:hover { opacity: 0.85; }

  /* CONTEXT MENU */
  .ctx-menu {
    position: fixed; background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: var(--radius); box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    padding: 4px; z-index: 300; min-width: 160px;
    opacity: 0; pointer-events: none; transform: scale(0.95);
    transform-origin: top left; transition: all 0.1s;
  }
  .ctx-menu.open { opacity: 1; pointer-events: all; transform: scale(1); }
  .ctx-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-dim);
    transition: all var(--t); font-weight: 500;
  }
  .ctx-item:hover { background: var(--surface2); color: var(--text); }
  .ctx-item.danger { color: var(--red); }
  .ctx-item.danger:hover { background: rgba(248,113,113,0.08); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface);
    border: 1px solid var(--border-bright); border-radius: var(--radius);
    padding: 10px 16px; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 8px; z-index: 400;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.info { border-color: var(--accent); color: var(--accent); }
  .search-highlight { background: var(--accent); color: #fff; border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <div class="brand"><div class="brand-icon">⌗</div>Scripts</div>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search cards…">
      </div>
    </div>
    <div class="sidebar-folders" id="sidebarFolders"></div>
    <button class="add-folder-btn" id="addFolderBtn">＋ New Folder</button>
  </aside>

  <div class="main-content">
    <div class="content-header" id="contentHeader" style="display:none">
      <div class="content-title" id="contentTitle"></div>
      <button class="add-script-btn" id="addScriptBtn">＋ Add Card</button>
    </div>
    <div class="scripts-grid" id="scriptsGrid">
      <div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;color:var(--text-muted)">
        <div style="font-size:40px;opacity:0.4">📂</div>
        <div style="font-weight:700;font-size:16px;color:var(--text-dim)">Select a folder</div>
        <div style="font-size:13px;max-width:260px;line-height:1.6">Choose a folder from the sidebar or create one to get started.</div>
      </div>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-panel" id="editorPanel">
    <div class="editor-header">
      <input type="text" class="editor-title-input" id="editorTitle" placeholder="Card title…">
      <button class="editor-close-btn" id="editorCloseBtn">✕</button>
    </div>

    <div class="editor-toolbar">
      <div class="pane-toggle">
        <button class="toggle-opt active" data-pane="script">
          <div class="toggle-dot"></div>Script
        </button>
        <button class="toggle-opt" data-pane="template">
          <div class="toggle-dot"></div>Template
        </button>
      </div>
      <div class="toolbar-sep"></div>
      <button class="copy-editor-btn" id="copyEditorBtn">⎘ Copy</button>
      <button class="save-btn" id="saveBtn">✓ Save</button>
    </div>

    <div class="pane-label-bar">
      <div class="pane-label pane-script-label" id="paneLabel">
        <div class="pane-label-dot"></div>Script — spoken / verbal
      </div>
      <span class="pane-char-count" id="paneCharCount">0 chars</span>
    </div>

    <textarea class="editor-textarea" id="editorTextarea"
      placeholder="Write the spoken version here…&#10;&#10;Use this for calls, conversations, or presentations."></textarea>

    <div class="editor-footer">
      <div class="editor-footer-meta" id="editorFooterMeta">Script: 0 · Template: 0</div>
      <div class="autosave-indicator"><div class="autosave-dot"></div>Auto-save on</div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="scriptModal">
  <div class="modal">
    <div class="modal-title">✦ New Card</div>
    <input type="text" class="modal-input" id="scriptNameInput" placeholder="Card name…">
    <div class="modal-actions">
      <button class="btn-cancel" id="scriptModalCancel">Cancel</button>
      <button class="btn-confirm" id="scriptModalConfirm">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <div class="modal-title">📁 New Folder</div>
    <input type="text" class="modal-input" id="folderNameInput" placeholder="Folder name…">
    <div class="modal-actions">
      <button class="btn-cancel" id="folderModalCancel">Cancel</button>
      <button class="btn-confirm" id="folderModalConfirm">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="renameFolderModal">
  <div class="modal">
    <div class="modal-title">✎ Rename Folder</div>
    <input type="text" class="modal-input" id="renameFolderInput" placeholder="New name…">
    <div class="modal-actions">
      <button class="btn-cancel" id="renameFolderCancel">Cancel</button>
      <button class="btn-confirm" id="renameFolderConfirm">Rename</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxEdit">✎ Open</div>
  <div class="ctx-item" id="ctxRename">⟳ Rename</div>
  <div class="ctx-item danger" id="ctxDelete">✕ Delete</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
let data = {
  folders: [
    {
      id: 'f1', name: 'General',
      scripts: [
        {
          id: 's1', name: 'Introduction',
          script: "Hi, my name is [Name] and I'm reaching out because I saw you're looking for help with [topic]. I've worked with similar teams and I'd love to learn more about what you're trying to accomplish. Do you have a few minutes to chat?",
          template: "Subject: Quick intro — [Name]\n\nHi [First Name],\n\nI came across your profile and wanted to reach out. I help teams with [topic] and think there could be a great fit here.\n\nWould you be open to a quick 15-min call this week?\n\nBest,\n[Name]",
          updated: '2026-03-28'
        },
        {
          id: 's2', name: 'Follow Up',
          script: "Hey [Name], just following up on our conversation from [day]. I wanted to see if you had a chance to think it over and if you have any questions I can help answer.",
          template: "Hi [Name],\n\nJust wanted to follow up on my last message. Happy to answer any questions or jump on a quick call if that's easier.\n\nLooking forward to hearing from you!\n\n[Your Name]",
          updated: '2026-03-27'
        }
      ]
    },
    {
      id: 'f2', name: 'Sales',
      scripts: [
        {
          id: 's3', name: 'Cold Outreach',
          script: "Hi [Name], I know this is out of the blue, but I've been following [Company] and I'm genuinely impressed by what you're building. I work with teams in your space and I think we could save you significant time on [pain point]. Worth a quick conversation?",
          template: "Subject: [Company] + [Your Company]\n\nHi [Name],\n\nI've been following [Company]'s work and I'm really impressed by [specific thing].\n\nWe help companies like yours with [value prop]. Open to a 20-min call this week?\n\n[Your Name]",
          updated: '2026-03-25'
        }
      ]
    }
  ]
};

let currentFolder = null;
let currentScript = null;
let activePane = 'script';
let searchQuery = '';
let autoSaveTimer = null;
let renamingFolderId = null;
let ctxTarget = null;

const PANE = {
  script:   { label: 'Script — spoken / verbal',   cls: 'pane-script-label',   ph: 'Write the spoken version here…\n\nUse this for calls, conversations, or presentations.' },
  template: { label: 'Template — email / text',     cls: 'pane-template-label', ph: 'Write the written version here…\n\nUse this for emails, texts, or messages.' }
};

// ── THEME ─────────────────────────────────────────────────
let isDark = true;
document.getElementById('themeBtn').addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
});

// ── TOGGLE PANE ───────────────────────────────────────────
function switchPane(pane) {
  if (!currentScript) return;
  // flush current pane
  if (activePane === 'script') currentScript.script = document.getElementById('editorTextarea').value;
  else currentScript.template = document.getElementById('editorTextarea').value;

  activePane = pane;
  const cfg = PANE[pane];
  const ta = document.getElementById('editorTextarea');
  ta.value = pane === 'script' ? currentScript.script : currentScript.template;
  ta.placeholder = cfg.ph;

  const lbl = document.getElementById('paneLabel');
  lbl.className = `pane-label ${cfg.cls}`;
  lbl.innerHTML = `<div class="pane-label-dot"></div>${cfg.label}`;

  document.querySelectorAll('.toggle-opt').forEach(b => b.classList.toggle('active', b.dataset.pane === pane));
  updateMeta();
  ta.focus();
}

document.querySelectorAll('.toggle-opt').forEach(btn => {
  btn.addEventListener('click', () => switchPane(btn.dataset.pane));
});

// ── SIDEBAR ───────────────────────────────────────────────
function renderSidebar() {
  const container = document.getElementById('sidebarFolders');
  const q = searchQuery.toLowerCase();
  const filtered = q
    ? data.folders.filter(f => f.scripts.some(s =>
        s.name.toLowerCase().includes(q) || s.script.toLowerCase().includes(q) || s.template.toLowerCase().includes(q)))
    : data.folders;

  let html = '<div class="folder-section-title">Folders</div>';
  if (!filtered.length) html += `<div style="padding:12px 8px;color:var(--text-muted);font-size:12px">No folders found</div>`;

  filtered.forEach(f => {
    const count = q
      ? f.scripts.filter(s => s.name.toLowerCase().includes(q) || s.script.toLowerCase().includes(q) || s.template.toLowerCase().includes(q)).length
      : f.scripts.length;
    const isActive = currentFolder && currentFolder.id === f.id;
    html += `
      <div class="folder-item ${isActive ? 'active' : ''}" data-fid="${f.id}">
        <span class="folder-icon">${isActive ? '📂' : '📁'}</span>
        <span class="folder-name">${f.name}</span>
        <span class="folder-count">${count}</span>
        <div class="folder-actions">
          <button class="icon-btn" data-action="rename" data-fid="${f.id}" title="Rename">✎</button>
          <button class="icon-btn danger" data-action="del-folder" data-fid="${f.id}" title="Delete">✕</button>
        </div>
      </div>`;
  });
  container.innerHTML = html;

  container.querySelectorAll('.folder-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.folder-actions')) return;
      currentFolder = data.folders.find(f => f.id === el.dataset.fid);
      closeEditor(); renderSidebar(); renderScripts();
    });
  });
  container.querySelectorAll('[data-action="rename"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      renamingFolderId = btn.dataset.fid;
      document.getElementById('renameFolderInput').value = data.folders.find(x => x.id === renamingFolderId).name;
      openModal('renameFolderModal');
    });
  });
  container.querySelectorAll('[data-action="del-folder"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const f = data.folders.find(x => x.id === btn.dataset.fid);
      if (confirm(`Delete folder "${f.name}" and all its cards?`)) {
        data.folders = data.folders.filter(x => x.id !== f.id);
        if (currentFolder && currentFolder.id === f.id) { currentFolder = null; closeEditor(); }
        renderSidebar(); renderScripts(); showToast('Folder deleted', 'info');
      }
    });
  });
}

// ── CARDS ─────────────────────────────────────────────────
function renderScripts() {
  const grid = document.getElementById('scriptsGrid');
  const header = document.getElementById('contentHeader');
  const titleEl = document.getElementById('contentTitle');

  if (!currentFolder) {
    header.style.display = 'none';
    grid.innerHTML = `<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;color:var(--text-muted)">
      <div style="font-size:40px;opacity:0.4">📂</div>
      <div style="font-weight:700;font-size:16px;color:var(--text-dim)">Select a folder</div>
      <div style="font-size:13px;max-width:260px;line-height:1.6">Choose a folder from the sidebar or create one to get started.</div>
    </div>`;
    return;
  }

  header.style.display = 'flex';
  const q = searchQuery.toLowerCase();
  const cards = q
    ? currentFolder.scripts.filter(s => s.name.toLowerCase().includes(q) || s.script.toLowerCase().includes(q) || s.template.toLowerCase().includes(q))
    : currentFolder.scripts;

  titleEl.innerHTML = `${currentFolder.name} <span class="folder-badge">${cards.length} ${cards.length === 1 ? 'card' : 'cards'}</span>`;

  if (!cards.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">${q ? '🔍' : '✨'}</div>
      <div class="empty-title">${q ? 'No results' : 'Empty folder'}</div>
      <div class="empty-desc">${q ? 'No cards match your search.' : 'Add your first card!'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = cards.map((s, i) => {
    const sp = s.script.trim().slice(0, 110);
    const tp = s.template.trim().slice(0, 110);
    return `
      <div class="script-card" data-sid="${s.id}" style="animation-delay:${i*0.03}s">
        <div class="card-title">${highlight(s.name, q)}</div>
        <div class="card-dual">
          <div class="card-half script-half">
            <div class="card-half-label"><div class="card-half-dot"></div>Script</div>
            <div class="card-half-preview ${sp ? '' : 'card-half-empty'}">${sp ? highlight(sp, q) + '…' : 'Empty'}</div>
          </div>
          <div class="card-half template-half">
            <div class="card-half-label"><div class="card-half-dot"></div>Template</div>
            <div class="card-half-preview ${tp ? '' : 'card-half-empty'}">${tp ? highlight(tp, q) + '…' : 'Empty'}</div>
          </div>
        </div>
        <div class="card-footer">
          <span class="card-date">${s.updated}</span>
          <div class="card-actions">
            <button class="card-copy-btn" data-sid="${s.id}" data-copy="script">⎘ Script</button>
            <button class="card-copy-btn" data-sid="${s.id}" data-copy="template">⎘ Template</button>
            <button class="card-menu-btn" data-sid="${s.id}">⋯</button>
          </div>
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.script-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-actions')) return;
      openScript(card.dataset.sid);
    });
  });

  grid.querySelectorAll('.card-copy-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const s = currentFolder.scripts.find(x => x.id === btn.dataset.sid);
      if (!s) return;
      const isScript = btn.dataset.copy === 'script';
      navigator.clipboard.writeText(isScript ? s.script : s.template).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Copied'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
        showToast(`${isScript ? 'Script' : 'Template'} copied`, 'success');
      });
    });
  });

  grid.querySelectorAll('.card-menu-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      ctxTarget = btn.dataset.sid;
      const menu = document.getElementById('ctxMenu');
      const rect = btn.getBoundingClientRect();
      menu.style.top = rect.bottom + 4 + 'px';
      menu.style.left = Math.min(rect.left, window.innerWidth - 180) + 'px';
      menu.classList.add('open');
    });
  });
}

function highlight(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}

// ── EDITOR ────────────────────────────────────────────────
function openScript(sid) {
  const s = currentFolder.scripts.find(x => x.id === sid);
  if (!s) return;
  currentScript = s;
  activePane = 'script';

  document.getElementById('editorTitle').value = s.name;
  const ta = document.getElementById('editorTextarea');
  ta.value = s.script;
  ta.placeholder = PANE.script.ph;

  document.querySelectorAll('.toggle-opt').forEach(b => b.classList.toggle('active', b.dataset.pane === 'script'));
  const lbl = document.getElementById('paneLabel');
  lbl.className = 'pane-label pane-script-label';
  lbl.innerHTML = `<div class="pane-label-dot"></div>${PANE.script.label}`;

  document.getElementById('saveBtn').className = 'save-btn';
  document.getElementById('saveBtn').textContent = '✓ Save';
  document.getElementById('editorPanel').classList.add('open');
  updateMeta();
  ta.focus();
}

function closeEditor() {
  currentScript = null;
  document.getElementById('editorPanel').classList.remove('open');
}

function updateMeta() {
  const val = document.getElementById('editorTextarea').value;
  document.getElementById('paneCharCount').textContent = val.length + ' chars';
  if (!currentScript) return;
  const sc = activePane === 'script' ? val.length : currentScript.script.length;
  const tm = activePane === 'template' ? val.length : currentScript.template.length;
  document.getElementById('editorFooterMeta').textContent = `Script: ${sc} · Template: ${tm}`;
}

function saveCurrentScript(showFeedback = true) {
  if (!currentScript || !currentFolder) return;
  currentScript.name = document.getElementById('editorTitle').value || 'Untitled';
  if (activePane === 'script') currentScript.script = document.getElementById('editorTextarea').value;
  else currentScript.template = document.getElementById('editorTextarea').value;
  currentScript.updated = new Date().toISOString().slice(0, 10);
  const match = currentFolder.scripts.find(s => s.id === currentScript.id);
  if (match) Object.assign(match, currentScript);
  renderScripts(); renderSidebar();
  if (showFeedback) {
    const btn = document.getElementById('saveBtn');
    btn.textContent = '✓ Saved!'; btn.className = 'save-btn saved';
    setTimeout(() => { btn.textContent = '✓ Save'; btn.className = 'save-btn'; }, 1500);
    showToast('Card saved', 'success');
  }
}

document.getElementById('editorTextarea').addEventListener('input', () => {
  updateMeta();
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => saveCurrentScript(false), 2000);
});
document.getElementById('editorTitle').addEventListener('input', () => {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => saveCurrentScript(false), 2000);
});

document.getElementById('saveBtn').addEventListener('click', () => saveCurrentScript(true));
document.getElementById('editorCloseBtn').addEventListener('click', closeEditor);

document.getElementById('copyEditorBtn').addEventListener('click', () => {
  const text = document.getElementById('editorTextarea').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyEditorBtn');
    btn.textContent = '✓ Copied'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Copy'; btn.classList.remove('copied'); }, 1800);
    showToast(`${activePane === 'script' ? 'Script' : 'Template'} copied`, 'success');
  });
});

// ── FOLDER ACTIONS ────────────────────────────────────────
document.getElementById('addFolderBtn').addEventListener('click', () => { document.getElementById('folderNameInput').value = ''; openModal('folderModal'); });
document.getElementById('folderModalCancel').addEventListener('click', () => closeModal('folderModal'));
document.getElementById('folderModalConfirm').addEventListener('click', () => {
  const name = document.getElementById('folderNameInput').value.trim();
  if (!name) return;
  const folder = { id: 'f' + Date.now(), name, scripts: [] };
  data.folders.push(folder); currentFolder = folder;
  closeModal('folderModal'); renderSidebar(); renderScripts();
  showToast('Folder created', 'success');
});
document.getElementById('folderNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('folderModalConfirm').click(); });

document.getElementById('renameFolderCancel').addEventListener('click', () => closeModal('renameFolderModal'));
document.getElementById('renameFolderConfirm').addEventListener('click', () => {
  const name = document.getElementById('renameFolderInput').value.trim();
  if (!name || !renamingFolderId) return;
  const f = data.folders.find(x => x.id === renamingFolderId);
  if (f) { f.name = name; if (currentFolder && currentFolder.id === f.id) currentFolder = f; }
  closeModal('renameFolderModal'); renderSidebar(); renderScripts();
  showToast('Folder renamed', 'info');
});
document.getElementById('renameFolderInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('renameFolderConfirm').click(); });

// ── ADD CARD ──────────────────────────────────────────────
document.getElementById('addScriptBtn').addEventListener('click', () => { document.getElementById('scriptNameInput').value = ''; openModal('scriptModal'); });
document.getElementById('scriptModalCancel').addEventListener('click', () => closeModal('scriptModal'));
document.getElementById('scriptModalConfirm').addEventListener('click', () => {
  const name = document.getElementById('scriptNameInput').value.trim();
  if (!name || !currentFolder) return;
  const card = { id: 's' + Date.now(), name, script: '', template: '', updated: new Date().toISOString().slice(0,10) };
  currentFolder.scripts.push(card);
  closeModal('scriptModal'); renderScripts(); renderSidebar();
  openScript(card.id);
  showToast('Card created', 'success');
});
document.getElementById('scriptNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('scriptModalConfirm').click(); });

// ── SEARCH ────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderSidebar(); renderScripts(); });

// ── CONTEXT MENU ──────────────────────────────────────────
document.getElementById('ctxEdit').addEventListener('click', () => { if (currentFolder && ctxTarget) openScript(ctxTarget); closeCtx(); });
document.getElementById('ctxRename').addEventListener('click', () => {
  if (currentFolder && ctxTarget) {
    const s = currentFolder.scripts.find(x => x.id === ctxTarget);
    if (s) {
      const name = prompt('Rename card:', s.name);
      if (name && name.trim()) {
        s.name = name.trim(); s.updated = new Date().toISOString().slice(0,10);
        if (currentScript && currentScript.id === s.id) document.getElementById('editorTitle').value = s.name;
        renderScripts(); showToast('Card renamed', 'info');
      }
    }
  }
  closeCtx();
});
document.getElementById('ctxDelete').addEventListener('click', () => {
  if (currentFolder && ctxTarget) {
    const s = currentFolder.scripts.find(x => x.id === ctxTarget);
    if (s && confirm(`Delete "${s.name}"?`)) {
      currentFolder.scripts = currentFolder.scripts.filter(x => x.id !== ctxTarget);
      if (currentScript && currentScript.id === ctxTarget) closeEditor();
      renderScripts(); renderSidebar(); showToast('Card deleted', 'info');
    }
  }
  closeCtx();
});
function closeCtx() { document.getElementById('ctxMenu').classList.remove('open'); }
document.addEventListener('click', closeCtx);

// ── MODALS ────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); setTimeout(() => { const i = document.querySelector(`#${id} input`); if (i) i.focus(); }, 100); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✓ ' : 'ℹ ') + msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2400);
}

renderSidebar();
renderScripts();
</script>
</body>
</html>
